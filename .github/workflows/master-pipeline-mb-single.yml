name: "Master Pipeline Caller  Mobile Single"

on:
  push:
    branches: [test, uat, main]
  pull_request:
    branches: [test, uat, main]
  workflow_dispatch:
    inputs:
      run_deploy:
        description: "Run deploy jobs"
        type: boolean
        default: true
      run_promotion:
        description: "Run PR promotion jobs"
        type: boolean
        default: true
      dry_run:
        description: "Preview-only mode (skip deploy/tag push, print PR body)"
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: write
  security-events: write
  actions: read
  checks: read
  statuses: read

concurrency:
  group: master-pipeline-mb-single-caller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  master-orchestrator:
    if: ${{ github.event.repository.name != 'central-workflow' }}
    name: "Call Central Mobile Master Pipeline"
    uses: ImplementSprint/central-workflow/.github/workflows/master-pipeline-mobile.yml@fix/mobile-gradle-permissions
    with:
      run_deploy: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_deploy == 'true' }}
      run_promotion: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.run_promotion == 'true' }}
      dry_run: ${{ github.run_attempt > 1 || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true') }}
      enable_grafana_k6: false
    secrets:
      GH_PR_TOKEN: ${{ secrets.GH_PR_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
      K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
